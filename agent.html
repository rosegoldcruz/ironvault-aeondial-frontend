<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEON DIAL — Agent</title>
<script src="https://cdn.jsdelivr.net/npm/@telnyx/webrtc/lib/bundle.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;
    --surface:#111118;
    --border:#1e1e2e;
    --cyan:#22d3ee;
    --cyan-dim:#0e7490;
    --red:#ef4444;
    --green:#22c55e;
    --yellow:#eab308;
    --text:#e2e8f0;
    --muted:#64748b;
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* ── LOGIN ── */
  #login-screen{width:100%;max-width:400px}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:22px;color:var(--cyan);letter-spacing:4px;text-align:center;margin-bottom:8px}
  .logo-wrap{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
  .logo-wrap .emblem{max-width:220px;height:auto}
  .logo-wrap .fox{max-height:90px;width:auto;filter:drop-shadow(0 0 8px rgba(0,200,255,0.5))}
  .logo img{max-width:180px;height:auto;display:block;margin:0 auto 8px}
  .logo-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:40px;letter-spacing:2px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
  .field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;font-size:15px;font-family:'IBM Plex Sans',sans-serif;outline:none;border-radius:4px;transition:border .2s}
  .field input:focus{border-color:var(--cyan)}
  .btn{width:100%;padding:14px;background:var(--cyan);color:#000;font-weight:600;font-size:15px;border:none;cursor:pointer;border-radius:4px;transition:background .2s;letter-spacing:1px}
  .btn:hover{background:var(--cyan-dim);color:#fff}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .error-msg{color:var(--red);font-size:13px;text-align:center;margin-top:12px}

  /* ── AGENT PANEL ── */
  #agent-screen{width:100%;max-width:520px;display:none}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px}
  .panel-title{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px}

  .status-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.cyan{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse 1.5s infinite}
  .dot.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
  .dot.red{background:var(--red)}
  .dot.gray{background:var(--muted)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .state-label{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--text)}
  .state-sub{font-size:13px;color:var(--muted);margin-top:4px}

  /* READY/PAUSE BUTTON */
  #ready-btn{
    width:100%;padding:16px;font-size:16px;font-weight:600;
    border:none;cursor:pointer;border-radius:6px;letter-spacing:1px;
    transition:all .2s;font-family:'IBM Plex Sans',sans-serif;margin-top:16px
  }
  #ready-btn.go-ready{background:var(--green);color:#000}
  #ready-btn.go-ready:hover{filter:brightness(1.1)}
  #ready-btn.go-pause{background:var(--yellow);color:#000}
  #ready-btn.go-pause:hover{filter:brightness(1.1)}
  #ready-btn:disabled{opacity:.4;cursor:not-allowed}

  /* MANUAL DIAL */
  #manual-dial-panel{margin-top:12px;display:flex;gap:8px;align-items:center}
  #manual-dial-input{
    flex:1;padding:10px 12px;background:var(--surface);border:1px solid #333;
    color:var(--text);border-radius:6px;font-size:14px;font-family:'IBM Plex Mono',monospace;
  }
  #manual-dial-input:focus{outline:none;border-color:var(--cyan)}
  #manual-dial-btn{
    padding:10px 16px;background:var(--cyan);color:#000;font-size:13px;font-weight:700;
    border:none;cursor:pointer;border-radius:6px;letter-spacing:1px;white-space:nowrap;
    transition:filter .15s;
  }
  #manual-dial-btn:hover{filter:brightness(1.1)}
  #manual-dial-btn:disabled{opacity:.4;cursor:not-allowed}

  /* LIVE CALL CARD */
  #call-card{display:none}
  .lead-name{font-size:26px;font-weight:600;margin-bottom:4px}
  .lead-location{font-size:14px;color:var(--muted);margin-bottom:16px}
  .timer{font-family:'IBM Plex Mono',monospace;font-size:32px;color:var(--cyan);margin-bottom:16px}
  .hangup-btn{width:100%;padding:14px;background:var(--red);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;border-radius:6px;letter-spacing:1px}
  .hangup-btn:hover{filter:brightness(1.1)}

  /* WRAP-UP MODAL */
  #wrapup-modal{
    position:fixed;inset:0;background:rgba(0,0,0,.85);
    display:none;align-items:center;justify-content:center;z-index:100;padding:24px
  }
  #wrapup-modal.open{display:flex}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:28px;width:100%;max-width:460px}
  .modal-title{font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--cyan);margin-bottom:20px}
  .disp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .disp-btn{padding:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;border-radius:4px;transition:all .15s;font-family:'IBM Plex Sans',sans-serif}
  .disp-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .disp-btn.selected{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:600}
  .notes-area{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;font-size:14px;border-radius:4px;resize:vertical;min-height:80px;font-family:'IBM Plex Sans',sans-serif;outline:none;margin-bottom:16px}
  .notes-area:focus{border-color:var(--cyan)}
  #callback-section{display:none;margin-bottom:16px}
  .callback-label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-family:'IBM Plex Mono',monospace}
  .cb-display{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-size:14px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border .2s}
  .cb-display:hover{border-color:var(--cyan)}
  .cb-display span{color:var(--muted)}
  .cb-display.has-val span{color:var(--text)}

  /* Calendar modal */
  #cal-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
  #cal-modal.open{display:flex}
  .cal-box{background:#16161f;border:1px solid var(--border);border-radius:10px;padding:20px;width:100%;max-width:320px}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-header button{background:none;border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .cal-header button:hover{border-color:var(--cyan);color:var(--cyan)}
  .cal-month{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--cyan);letter-spacing:1px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
  .cal-dow{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
  .cal-day{text-align:center;padding:7px 2px;border-radius:4px;cursor:pointer;font-size:13px;border:1px solid transparent;transition:all .15s}
  .cal-day:hover:not(.empty):not(.disabled){border-color:var(--cyan);color:var(--cyan)}
  .cal-day.empty{cursor:default}
  .cal-day.disabled{color:#333;cursor:not-allowed}
  .cal-day.selected{background:var(--cyan);color:#000;font-weight:700}
  .cal-day.today{border-color:var(--cyan-dim)}
  .cal-time{display:flex;align-items:center;gap:8px;margin-bottom:16px}
  .cal-time select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:4px;font-size:14px;outline:none;cursor:pointer}
  .cal-time select:focus{border-color:var(--cyan)}
  .cal-time-sep{color:var(--muted);font-size:18px;font-weight:bold}
  .cal-time-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  .cal-confirm{width:100%;padding:11px;background:var(--cyan);color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer;border-radius:4px;letter-spacing:1px}
  .cal-confirm:hover{filter:brightness(1.1)}
  .cal-cancel{width:100%;padding:9px;background:none;border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;border-radius:4px;margin-top:6px}
  .cal-cancel:hover{border-color:var(--red);color:var(--red)}
  .submit-btn{width:100%;padding:14px;background:var(--cyan);color:#000;font-weight:600;font-size:15px;border:none;cursor:pointer;border-radius:4px;letter-spacing:1px}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed}

  .agent-info{font-size:13px;color:var(--muted);text-align:right;margin-bottom:12px;font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>

<!-- ── LOGIN ────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="logo">
    <div class="logo-wrap">
      <img class="emblem" src="/logo.png" alt="AEON DIAL" onerror="this.style.display='none'" />
      <img class="fox" src="/logo-fox.png" alt="" onerror="this.style.display='none'" />
    </div>
  </div>
  <div class="logo-sub">AGENT PORTAL</div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username-input" placeholder="daniel" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn" onclick="handleLogin()">LOGIN</button>
  <div class="error-msg" id="login-error"></div>
</div>

<!-- ── AGENT PANEL ───────────────────────────────────────── -->
<div id="agent-screen">
  <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px">
    <img src="/logo.png" alt="AEON DIAL" style="max-height:72px;width:auto" onerror="this.style.display='none'" />
    <img src="/logo-fox.png" alt="" style="max-height:80px;width:auto;filter:drop-shadow(0 0 8px rgba(0,200,255,0.5))" onerror="this.style.display='none'" />
  </div>
  <div class="agent-info" id="agent-name-display">—</div>

  <div class="panel">
    <div class="panel-title">Connection Status</div>
    <div class="status-row">
      <div class="dot gray" id="sip-dot"></div>
      <span id="sip-status">Initializing WebRTC...</span>
    </div>
    <div class="status-row">
      <div class="dot gray" id="state-dot"></div>
      <div>
        <div class="state-label" id="state-label">OFFLINE</div>
        <div class="state-sub" id="state-sub">Log in to begin</div>
      </div>
    </div>
    <button id="ready-btn" class="go-ready" onclick="toggleReady()" disabled>GO READY</button>
    <div id="manual-dial-panel">
      <input id="manual-dial-input" type="tel" placeholder="Manual dial: 480-364-8205" />
      <button id="manual-dial-btn" onclick="manualDial()" disabled>DIAL</button>
    </div>
  </div>

  <!-- Live Call Card -->
  <div class="panel" id="call-card">
    <div class="panel-title">Live Call</div>
    <div class="lead-name" id="lead-name">Unknown Caller</div>
    <div class="lead-location" id="lead-location">—</div>
    <div class="timer" id="call-timer">00:00</div>
    <button class="hangup-btn" onclick="hangupCurrentCall()">END CALL</button>
  </div>
  <audio id="remote-media" autoplay playsinline></audio>
</div>

<!-- ── CALENDAR MODAL ───────────────────────────────────── -->
<div id="cal-modal">
  <div class="cal-box">
    <div class="cal-header">
      <button onclick="calNav(-1)">&#8249;</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button onclick="calNav(1)">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-time-label">Time</div>
    <div class="cal-time">
      <select id="cal-hour"></select>
      <span class="cal-time-sep">:</span>
      <select id="cal-min"></select>
      <select id="cal-ampm"><option>AM</option><option>PM</option></select>
    </div>
    <button class="cal-confirm" onclick="calConfirm()">CONFIRM</button>
    <button class="cal-cancel" onclick="closeCalModal()">CANCEL</button>
  </div>
</div>

<!-- ── WRAP-UP MODAL ──────────────────────────────────────── -->
<div id="wrapup-modal">
  <div class="modal-box">
    <div class="modal-title">Wrap Up — Select Disposition</div>
    <div class="disp-grid" id="disp-grid"></div>
    <textarea class="notes-area" id="notes-input" placeholder="Notes (optional)..."></textarea>
    <div id="callback-section">
      <div class="callback-label">Callback Date & Time</div>
      <div class="cb-display" id="cb-display" onclick="openCalModal()">
        <span id="cb-display-text">Pick a date & time...</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
    </div>
    <button class="submit-btn" id="submit-wrapup" onclick="submitWrapUp()">SUBMIT & GO READY</button>
  </div>
</div>

<script>
const API = 'https://api.aeondial.com';
const DISPOSITIONS = ['Interested','Not Interested','Callback','Do Not Call','No Answer','Voicemail','Wrong Number','Other'];

let token = null;
let agentData = null;
let telnyxClient = null;
let activeTelnyxCall = null;
let currentCallId = null;
let callTimerInterval = null;
let callStartTime = null;
let selectedDisposition = null;
let pollInterval = null;
let calSelectedDate = null; // Date object for selected calendar day
let calViewYear = null;
let calViewMonth = null; // 0-indexed
let calCallbackISO = null; // final ISO string set on confirm
let beepedCallId = null;

// ── CALENDAR ────────────────────────────────────────────────
function openCalModal() {
  const now = new Date();
  calViewYear = now.getFullYear();
  calViewMonth = now.getMonth();
  if (!calSelectedDate) calSelectedDate = null;
  buildCalGrid();
  buildTimeSelects(now);
  document.getElementById('cal-modal').classList.add('open');
}
function closeCalModal() {
  document.getElementById('cal-modal').classList.remove('open');
}
function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  buildCalGrid();
}
function buildCalGrid() {
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${MONTHS[calViewMonth]} ${calViewYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d;
    grid.appendChild(el);
  });
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day'; el.textContent = d;
    const thisDate = new Date(calViewYear, calViewMonth, d);
    if (thisDate < today) { el.classList.add('disabled'); }
    else {
      if (thisDate.getTime() === today.getTime()) el.classList.add('today');
      if (calSelectedDate && calSelectedDate.getFullYear()===calViewYear && calSelectedDate.getMonth()===calViewMonth && calSelectedDate.getDate()===d) el.classList.add('selected');
      el.onclick = () => {
        calSelectedDate = new Date(calViewYear, calViewMonth, d);
        buildCalGrid();
      };
    }
    grid.appendChild(el);
  }
}
function buildTimeSelects(now) {
  const hSel = document.getElementById('cal-hour');
  const mSel = document.getElementById('cal-min');
  const ampm = document.getElementById('cal-ampm');
  hSel.innerHTML = ''; mSel.innerHTML = '';
  for (let h = 1; h <= 12; h++) {
    const o = document.createElement('option'); o.value = h; o.textContent = String(h).padStart(2,'0');
    hSel.appendChild(o);
  }
  for (let m = 0; m < 60; m += 15) {
    const o = document.createElement('option'); o.value = m; o.textContent = String(m).padStart(2,'0');
    mSel.appendChild(o);
  }
  // Default to next hour
  let h = now.getHours() + 1; if (h >= 24) h = 0;
  ampm.value = h >= 12 ? 'PM' : 'AM';
  hSel.value = h % 12 || 12;
  mSel.value = 0;
}
function calConfirm() {
  if (!calSelectedDate) { alert('Please select a date.'); return; }
  const h = parseInt(document.getElementById('cal-hour').value);
  const m = parseInt(document.getElementById('cal-min').value);
  const ampm = document.getElementById('cal-ampm').value;
  let hours24 = h % 12 + (ampm === 'PM' ? 12 : 0);
  const dt = new Date(calSelectedDate);
  dt.setHours(hours24, m, 0, 0);
  calCallbackISO = dt.toISOString();
  const display = dt.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
  const dispEl = document.getElementById('cb-display');
  document.getElementById('cb-display-text').textContent = display;
  dispEl.classList.add('has-val');
  closeCalModal();
}
let holdAudioCtx = null;
let holdOscillator = null;
let holdGain = null;

  // ── LOGIN ────────────────────────────────────────────────
  async function handleLogin() {
  const username = document.getElementById('username-input').value.trim();
  const pass = document.getElementById('pass-input').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');

  if (!username || !pass) { err.textContent = 'Username and password required'; return; }

  btn.disabled = true; btn.textContent = 'LOGGING IN...';
  err.textContent = '';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password: pass }),
    });

    const data = await res.json();
    if (!res.ok) { err.textContent = data.error ?? 'Login failed'; btn.disabled = false; btn.textContent = 'LOGIN'; return; }

    token = data.token;
    agentData = data.agent;
    document.getElementById('agent-name-display').textContent = agentData.name;

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('agent-screen').style.display = 'block';

    await initWebRTC();
    startSessionPoll();
  } catch(e) {
    err.textContent = 'Connection error'; btn.disabled = false; btn.textContent = 'LOGIN';
  }
}

// ── WEBRTC INIT ─────────────────────────────────────────
async function initWebRTC() {
  updateSipStatus('gray', 'Fetching WebRTC credentials...');

  try {
    const res = await apiFetch('/session/webrtc-token');
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error ?? 'Failed to fetch SIP credentials');
    }

    const { sip_username, sip_password } = data;
    if (!sip_username || !sip_password) {
      throw new Error('Missing SIP credentials from backend');
    }

    const TelnyxDevice = window.TelnyxWebRTC?.TelnyxRTC;
    if (!TelnyxDevice) {
      throw new Error('Telnyx WebRTC SDK not loaded');
    }

    if (telnyxClient) {
      try { telnyxClient.disconnect(); } catch {}
    }

    telnyxClient = new TelnyxDevice({
      login: sip_username,
      password: sip_password,
      ringtoneFile: null,
      ringbackFile: null,
      enableBusyTone: false,
      debug: false,
      useMic: true,
      useSpeaker: true,
      remoteElement: 'remote-media',
      codecPreferences: ['OPUS', 'PCMU', 'PCMA'],
    });
    telnyxClient.remoteElement = 'remote-media';

    telnyxClient
      .on('telnyx.ready', async () => {
        updateSipStatus('green', 'REGISTERED');
        await apiFetch('/session/register', 'POST');
        updateState('REGISTERED', 'Click GO READY to start receiving calls');
        document.getElementById('ready-btn').disabled = false;
        document.getElementById('manual-dial-btn').disabled = false;
      })
      .on('telnyx.error', (err) => {
        console.warn('[WebRTC] Non-fatal error:', err);
        setTimeout(async () => {
          if (telnyxClient && telnyxClient.connected) {
            updateSipStatus('green', 'REGISTERED');
          } else {
            updateSipStatus('red', 'WebRTC Error — reconnecting...');
            try { telnyxClient.connect(); } catch(e) {}
          }
        }, 2000);
      })
      .on('telnyx.notification', async (notification) => {
        const call = notification?.call;

        if (notification?.type !== 'callUpdate' || !call) {
          return;
        }

        activeTelnyxCall = call;

        if (call.state === 'ringing') {
          console.log('[WebRTC] Incoming call from dialer');
          updateState('RESERVED', 'Dialing lead...');
          document.getElementById('lead-name').textContent = 'Dialing lead...';
          document.getElementById('lead-location').textContent = 'Waiting for lead to pick up';
          document.getElementById('call-card').style.display = 'block';
          call.answer();
          // Fetch lead info immediately so agent sees who is being dialed
          fetchCurrentCall();
          return;
        }

        if (['answering', 'early'].includes(call.state)) {
          updateState('RESERVED', 'Dialing lead...');
          document.getElementById('call-card').style.display = 'block';
          // Start a quiet hold tone so agent knows they're on the line
          startHoldTone();
          fetchCurrentCall();
          return;
        }

        if (call.state === 'active') {
          console.log('[WebRTC] Call active - bridged');
          stopHoldTone();
          document.getElementById('call-card').style.display = 'block';
          document.getElementById('manual-dial-btn').disabled = true;
          await fetchCurrentCall();
          return;
        }

        if (['hangup', 'destroy', 'purge'].includes(call.state)) {
          activeTelnyxCall = null;
          stopHoldTone();
          beepedCallId = null;
          document.getElementById('manual-dial-btn').disabled = false;
          console.log('[WebRTC] Call ended');
        }
      });

    try { telnyxClient.enableMicrophone(); } catch (err) { console.warn('Microphone enable failed:', err); }
    updateSipStatus('cyan', 'Connecting to Telnyx...');
    telnyxClient.connect();
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => console.log('[WebRTC] Mic access granted'))
      .catch(err => console.error('[WebRTC] Mic access denied:', err));
  } catch(e) {
    updateSipStatus('red', 'Failed to initialize WebRTC');
    console.error('WebRTC Init Error:', e);
  }
}

// ── READY / PAUSE ────────────────────────────────────────
async function toggleReady() {
  const btn = document.getElementById('ready-btn');
  const currentState = document.getElementById('state-label').textContent;

  btn.disabled = true;

  if (['REGISTERED','WRAP_UP','PAUSED'].includes(currentState)) {
    const res = await apiFetch('/session/ready', 'POST');
    if (res.ok) {
      updateState('READY', 'Waiting for next live answer...');
      btn.className = 'go-pause'; btn.textContent = 'PAUSE';
    }
  } else if (currentState === 'READY') {
    const res = await apiFetch('/session/pause', 'POST');
    if (res.ok) {
      updateState('PAUSED', 'Paused — calls will not be routed to you');
      btn.className = 'go-ready'; btn.textContent = 'GO READY';
    }
  }

  btn.disabled = false;
}

// ── SESSION POLL ─────────────────────────────────────────
function startSessionPoll() {
  pollInterval = setInterval(async () => {
    try {
      const res = await apiFetch('/session/me');
      const { session } = await res.json();
      if (!session) return;

      const state = session.state;
      syncStateUI(state);

      // If bridged or reserved, fetch call info
      if ((state === 'IN_CALL' || state === 'RESERVED') && !currentCallId) {
        await fetchCurrentCall();
      }

      // If WRAP_UP, show modal (and hydrate currentCallId from server if needed)
      if (state === 'WRAP_UP') {
        stopHoldTone();
        if (beepedCallId) { playDisconnectTone(); beepedCallId = null; }
        if (!currentCallId) {
          await fetchCurrentCall();
        }
        if (!document.getElementById('wrapup-modal').classList.contains('open')) {
          stopCallTimer();
          document.getElementById('call-card').style.display = 'none';
          openWrapUp();
        }
      }
    } catch(e) { /* silent */ }
  }, 500);
}

async function manualDial() {
  const input = document.getElementById('manual-dial-input');
  const btn = document.getElementById('manual-dial-btn');
  const phone = input.value.trim();
  if (!phone) return;
  btn.disabled = true;
  btn.textContent = 'DIALING...';
  try {
    const res = await apiFetch('/calls/manual-dial', 'POST', { phone });
    if (!res.ok) {
      const err = await res.json();
      alert('Dial failed: ' + (err.error ?? 'Unknown error'));
    } else {
      input.value = '';
    }
  } catch(e) {
    alert('Dial error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'DIAL';
  }
}

async function fetchCurrentCall() {
  try {
    const res = await apiFetch('/calls/current');
    const { call } = await res.json();
    if (!call) return;

    currentCallId = call.id;
    const lead = call.leads;
    const fullName = [lead?.first_name, lead?.last_name].filter(Boolean).join(' ');
    const location = [lead?.city, lead?.state].filter(Boolean).join(', ');

    document.getElementById('lead-name').textContent = fullName || lead?.phone || 'Unknown';
    document.getElementById('lead-location').textContent = location || lead?.phone || '—';
    document.getElementById('call-card').style.display = 'block';

    // Status sub-label based on call status
    const statusMap = {
      created: 'Preparing call...',
      agent_dialing: 'Connecting you...',
      agent_answered: 'Dialing lead...',
      lead_dialing: 'Dialing lead...',
      lead_answered: 'Live human! Connecting...',
      dialing: 'Dialing lead...',
      agent_reserved: 'Connecting you...',
      bridged: 'Live call in progress',
    };
    const sub = statusMap[call.status] ?? call.status;
    document.getElementById('state-sub').textContent = sub;

    if ((call.answered_at || call.status === 'bridged') && !callTimerInterval) {
      callStartTime = new Date(call.answered_at ?? call.started_at);
      startCallTimer();
    }
    if (call.status === 'bridged' && beepedCallId !== call.id) {
      const bridgedMs = call.answered_at ? Date.now() - new Date(call.answered_at).getTime() : 99999;
      beepedCallId = call.id;
      if (bridgedMs < 60000) playBridgeBeep();
    }
  } catch (e) {
    console.warn('fetchCurrentCall failed:', e);
  }
}

// ── AUDIO CUES ───────────────────────────────────────────
function playBridgeBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.18);
    osc.onended = () => ctx.close();
  } catch(e) {}
}
function playDisconnectTone() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    [440, 330].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      osc.connect(gain);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.18);
      gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.15);
      osc.start(ctx.currentTime + i * 0.18);
      osc.stop(ctx.currentTime + i * 0.18 + 0.15);
      if (i === 1) osc.onended = () => ctx.close();
    });
  } catch(e) {}
}

// ── CALL TIMER ───────────────────────────────────────────
function startCallTimer() {
  stopCallTimer();
  callTimerInterval = setInterval(() => {
    const secs = Math.floor((Date.now() - callStartTime.getTime()) / 1000);
    const m = String(Math.floor(secs / 60)).padStart(2,'0');
    const s = String(secs % 60).padStart(2,'0');
    document.getElementById('call-timer').textContent = `${m}:${s}`;
  }, 1000);
}

function stopCallTimer() {
  if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
}

// ── HANG UP ──────────────────────────────────────────────
async function hangupCurrentCall() {
  console.log('[END CALL] clicked, currentCallId=', currentCallId, 'activeTelnyxCall=', !!activeTelnyxCall);
  const btn = document.querySelector('.hangup-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'ENDING...'; }

  // 1) Hang up local WebRTC leg if we still have one
  if (activeTelnyxCall) {
    try { activeTelnyxCall.hangup(); } catch(e) { console.warn('Local hangup failed:', e); }
    activeTelnyxCall = null;
  }

  // 2) Always tell the backend to hang up both legs via Telnyx (handles
  //    the case where WebRTC session is stale or call object was cleared)
  if (currentCallId) {
    try {
      await apiFetch(`/calls/${currentCallId}/hangup`, 'POST');
    } catch (e) {
      console.warn('Backend hangup failed:', e);
    }
  }

  // 3) Clear UI immediately so user isn't stuck looking at a dead card
  stopHoldTone();
  stopCallTimer();
  document.getElementById('call-card').style.display = 'none';
  document.getElementById('call-timer').textContent = '00:00';
  if (btn) { btn.disabled = false; btn.textContent = 'END CALL'; }
}

// ── WRAP-UP ──────────────────────────────────────────────
function openWrapUp() {
  selectedDisposition = null;
  document.getElementById('notes-input').value = '';
  document.getElementById('callback-section').style.display = 'none';
  document.getElementById('submit-wrapup').disabled = true;

  // Build disposition buttons
  const grid = document.getElementById('disp-grid');
  grid.innerHTML = '';
  DISPOSITIONS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'disp-btn';
    btn.textContent = d;
    btn.onclick = () => selectDisposition(d);
    grid.appendChild(btn);
  });

  document.getElementById('wrapup-modal').classList.add('open');
}

function selectDisposition(d) {
  selectedDisposition = d;
  document.querySelectorAll('.disp-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === d);
  });
  document.getElementById('callback-section').style.display = d === 'Callback' ? 'block' : 'none';
  document.getElementById('submit-wrapup').disabled = false;
}

async function submitWrapUp() {
  if (!selectedDisposition || !currentCallId) return;

  // Validate callback date before touching the button
  let callback_at = undefined;
  if (selectedDisposition === 'Callback') {
    if (!calCallbackISO) { alert('Please pick a callback date & time.'); return; }
    callback_at = calCallbackISO;
  }

  const btn = document.getElementById('submit-wrapup');
  btn.disabled = true; btn.textContent = 'SAVING...';

  const body = {
    disposition: selectedDisposition,
    notes: document.getElementById('notes-input').value.trim() || undefined,
    callback_at,
  };

  try {
    const res = await apiFetch(`/calls/${currentCallId}/wrapup`, 'POST', body);
    if (res.ok) {
      document.getElementById('wrapup-modal').classList.remove('open');
      calCallbackISO = null; calSelectedDate = null;
      document.getElementById('cb-display-text').textContent = 'Pick a date & time...';
      document.getElementById('cb-display').classList.remove('has-val');
      currentCallId = null;
      document.getElementById('call-card').style.display = 'none';
      document.getElementById('call-timer').textContent = '00:00';
      updateState('READY', 'Waiting for next live answer...');
      document.getElementById('ready-btn').className = 'go-pause';
      document.getElementById('ready-btn').textContent = 'PAUSE';
      document.getElementById('ready-btn').disabled = false;
    } else {
      const errData = await res.json().catch(() => ({}));
      console.error('[WRAPUP] Server error:', res.status, errData);
      btn.disabled = false; btn.textContent = 'SUBMIT & GO READY';
      alert(`Save failed (${res.status}): ${errData.error || 'Unknown error'}`);
    }
  } catch(e) {
    console.error('[WRAPUP] Fetch error:', e);
    btn.disabled = false; btn.textContent = 'SUBMIT & GO READY';
  }
}

// ── UI HELPERS ────────────────────────────────────────────
function syncStateUI(state) {
  updateState(state, stateSubtext(state));
  const btn = document.getElementById('ready-btn');
  if (state === 'READY') {
    btn.className = 'go-pause'; btn.textContent = 'PAUSE'; btn.disabled = false;
  } else if (['REGISTERED','PAUSED','WRAP_UP'].includes(state)) {
    btn.className = 'go-ready'; btn.textContent = 'GO READY'; btn.disabled = false;
  } else {
    btn.disabled = true;
  }

  // Hide the Live Call card whenever we're not in a call-related state.
  // This prevents stale cards (like an aborted call) from lingering.
  const callStates = ['RESERVED', 'IN_CALL', 'WRAP_UP'];
  if (!callStates.includes(state)) {
    stopHoldTone();
    stopCallTimer();
    if (currentCallId) {
      currentCallId = null;
      document.getElementById('call-card').style.display = 'none';
      document.getElementById('call-timer').textContent = '00:00';
    }
  }
}

function stateSubtext(s) {
  const map = {
    OFFLINE:'Not connected',REGISTERING:'Connecting...',REGISTERED:'Click GO READY to start',
    READY:'Waiting for next live answer...',RESERVED:'Connecting call...',
    IN_CALL:'Live call in progress',WRAP_UP:'Complete wrap-up to continue',
    PAUSED:'Paused — not receiving calls',ERROR:'Error — refresh page',
  };
  return map[s] ?? s;
}

function updateState(state, sub) {
  document.getElementById('state-label').textContent = state;
  document.getElementById('state-sub').textContent = sub;
  const colors = {
    READY:'cyan',IN_CALL:'green',RESERVED:'yellow',WRAP_UP:'yellow',
    REGISTERED:'green',PAUSED:'gray',ERROR:'red',OFFLINE:'gray',
  };
  const dot = document.getElementById('state-dot');
  dot.className = 'dot ' + (colors[state] ?? 'gray');
}

function updateSipStatus(color, text) {
  document.getElementById('sip-dot').className = 'dot ' + color;
  document.getElementById('sip-status').textContent = text;
}

// ── HOLD TONE (Web Audio API, no external files) ──────────
function startHoldTone() {
  try {
    if (holdAudioCtx) return;
    holdAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    holdOscillator = holdAudioCtx.createOscillator();
    holdGain = holdAudioCtx.createGain();
    holdOscillator.type = 'sine';
    holdOscillator.frequency.value = 440; // A4 dial tone
    holdGain.gain.value = 0.05; // quiet
    holdOscillator.connect(holdGain);
    holdGain.connect(holdAudioCtx.destination);
    holdOscillator.start();
    // Pulse on/off every 500ms like a dial tone
    const lfo = holdAudioCtx.createOscillator();
    const lfoGain = holdAudioCtx.createGain();
    lfo.frequency.value = 1; // 1 Hz pulse
    lfo.connect(lfoGain);
    lfoGain.gain.value = 0.05;
    lfoGain.connect(holdGain.gain);
    lfo.start();
  } catch (e) {
    console.warn('Hold tone failed:', e);
  }
}

function stopHoldTone() {
  try {
    if (holdOscillator) { holdOscillator.stop(); holdOscillator.disconnect(); holdOscillator = null; }
    if (holdGain) { holdGain.disconnect(); holdGain = null; }
    if (holdAudioCtx) { holdAudioCtx.close(); holdAudioCtx = null; }
  } catch (e) { /* ignore */ }
}

function apiFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: body 
      ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
      : { 'Authorization': `Bearer ${token}` },
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts);
}

// Enter key on password
document.getElementById('pass-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ── ALIEN ANIMATED CURSORS ──────────────────────────────
(async () => {
  try {
    const res = await fetch('/cursors/manifest.json');
    if (!res.ok) return;
    const manifest = await res.json();

    const cursorMap = {
      'default':   'NormalSelect',
      'pointer':   'LinkSelect',
      'wait':      'Busy',
      'progress':  'WorkingInBackground',
      'text':      'TextSelect',
      'move':      'Move',
      'crosshair': 'PrecisionSelect',
      'not-allowed': 'Unavailable',
      'help':      'HelpSelect',
      'ew-resize': 'HorizontalResize',
      'ns-resize': 'VerticalResize',
      'nwse-resize':'DiagonalResize1',
      'nesw-resize':'DiagonalResize2',
    };

    // Pre-build CSS data URLs for each cursor type
    const cursorFrames = {}; // name -> [{url, ms}]

    async function loadFrames(name) {
      if (cursorFrames[name]) return cursorFrames[name];
      const info = manifest[name];
      if (!info) return null;
      const frames = [];
      for (let i = 0; i < info.frames; i++) {
        frames.push({ url: `/cursors/${name}/frame-${i}.png`, ms: info.frameMs[i] ?? 100 });
      }
      cursorFrames[name] = frames;
      return frames;
    }

    // Animate cursor for a given element
    const activeTimers = new WeakMap();

    async function applyCursor(el, cursorName, hotspotX = 0, hotspotY = 0) {
      const frames = await loadFrames(cursorName);
      if (!frames || frames.length === 0) return;

      // Clear previous timer
      if (activeTimers.has(el)) clearTimeout(activeTimers.get(el));

      let idx = 0;
      function tick() {
        const f = frames[idx % frames.length];
        el.style.cursor = `url('${f.url}') ${hotspotX} ${hotspotY}, auto`;
        idx++;
        activeTimers.set(el, setTimeout(tick, f.ms));
      }
      tick();
    }

    function resetCursor(el) {
      if (activeTimers.has(el)) { clearTimeout(activeTimers.get(el)); activeTimers.delete(el); }
      el.style.cursor = '';
    }

    // Hotspot hints (approximate for this cursor set)
    const hotspots = {
      NormalSelect:      [0, 0],
      LinkSelect:        [8, 2],
      Busy:              [16, 16],
      WorkingInBackground:[0, 0],
      TextSelect:        [4, 8],
      Move:              [16, 16],
      PrecisionSelect:   [16, 16],
      Unavailable:       [16, 16],
      HelpSelect:        [0, 0],
      HorizontalResize:  [16, 8],
      VerticalResize:    [8, 16],
      DiagonalResize1:   [16, 16],
      DiagonalResize2:   [16, 16],
    };

    // Apply to document body and watch for pointer-type changes
    const body = document.body;
    applyCursor(body, 'NormalSelect', 0, 0);

    // Override cursor on interactive elements
    function patchElement(el) {
      const computed = window.getComputedStyle(el).cursor;
      for (const [cssCursor, alienName] of Object.entries(cursorMap)) {
        if (computed === cssCursor) {
          const hs = hotspots[alienName] ?? [0, 0];
          el.addEventListener('mouseenter', () => applyCursor(body, alienName, hs[0], hs[1]));
          el.addEventListener('mouseleave', () => applyCursor(body, 'NormalSelect', 0, 0));
          break;
        }
      }
    }

    // Patch buttons, links, inputs on hover dynamically
    document.addEventListener('mouseover', (e) => {
      const el = e.target;
      const tag = el.tagName;
      if (tag === 'BUTTON' || tag === 'A' || el.onclick) {
        const hs = hotspots['LinkSelect'] ?? [8, 2];
        applyCursor(body, 'LinkSelect', hs[0], hs[1]);
      } else if (tag === 'INPUT' || tag === 'TEXTAREA') {
        applyCursor(body, 'TextSelect', 4, 8);
      }
    });
    document.addEventListener('mouseout', (e) => {
      const to = e.relatedTarget;
      if (!to || to === document.body) {
        applyCursor(body, 'NormalSelect', 0, 0);
      }
    });

  } catch(e) { /* silent — cursors are cosmetic */ }
})();
